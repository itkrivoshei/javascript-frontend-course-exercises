version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 2
    commit-message:
      prefix: deps
    groups:
      exercise-tooling:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:30"
      timezone: Europe/Berlin
    open-pull-requests-limit: 1
    commit-message:
      prefix: deps
    groups:
      actions-dependencies:
        patterns:
          - "*"
